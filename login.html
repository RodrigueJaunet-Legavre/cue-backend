<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yamhrZmR2aWh1dnFjanhoandlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MzU2ODEsImV4cCI6MjA5NDAxMTY4MX0.Ti7anM1O3KqbZYLxRkl1rWbcghJF5FgmRxNqOTV6JL0">
  <title>CUE — Connexion</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFC300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CUE">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#ddd; font-family:Barlow,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#111; border:1px solid rgba(255,195,0,.13); border-radius:20px; padding:48px; width:440px; max-width:100%; }
    .logo { color:#FFC300; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:32px; text-align:center; margin-bottom:8px; }
    h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; text-align:center; color:#fff; margin-bottom:32px; }
    .form-group { margin-bottom:16px; }
    label { display:block; color:#888; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    input { width:100%; background:#1a1a1a; border:1px solid #333; color:#ddd; padding:14px 16px; border-radius:10px; font-size:15px; font-family:Barlow,sans-serif; transition:border-color .2s; }
    input:focus { outline:none; border-color:#FFC300; }
    .password-wrap { position:relative; }
    .eye-btn { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:#888; }
    .btn-primary { width:100%; padding:16px; background:#FFC300; color:#000; border:none; border-radius:10px; font-weight:700; font-size:16px; cursor:pointer; font-family:Barlow,sans-serif; margin-top:8px; transition:all .2s; }
    .btn-primary:hover { background:#FFD740; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-google { width:100%; padding:14px; background:#fff; color:#333; border:none; border-radius:10px; font-weight:700; font-size:15px; cursor:pointer; font-family:Barlow,sans-serif; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; transition:all .2s; }
    .btn-google:hover { background:#f5f5f5; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#555; font-size:13px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#333; }
    .error { background:rgba(255,68,68,.1); color:#ff4444; border:1px solid rgba(255,68,68,.2); border-radius:8px; padding:12px; font-size:14px; margin-bottom:16px; display:none; }
    .link { text-align:center; margin-top:24px; color:#888; font-size:14px; }
    .link a { color:#FFC300; text-decoration:none; font-weight:700; }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px !important;
        align-items: flex-start !important;
        min-height: 100vh !important;
      }
      .card {
        width: 100% !important;
        padding: 32px 20px !important;
        border-radius: 16px !important;
      }
      h1 {
        font-size: 26px !important;
        line-height: 1.1 !important;
      }
      input {
        font-size: 16px !important;
      }
      .btn-primary {
        padding: 16px !important;
        font-size: 16px !important;
      }
      .btn-google {
        padding: 14px !important;
        font-size: 15px !important;
      }
      .form-group {
        margin-bottom: 14px !important;
      }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">CUE</div>
  <h1>Connexion</h1>

  <div class="error" id="error-msg"></div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="ton@email.com" required>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-primary" id="login-btn">Se connecter</button>
  </form>

  <div class="divider">ou</div>

  <button class="btn-google" onclick="loginWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
    Continuer avec Google
  </button>

  <div class="link">
    Pas encore de compte ? <a href="inscription.html">S'inscrire</a>
  </div>
</div>

<script>
function togglePwd() {
  const input = document.getElementById('password')
  input.type = input.type === 'password' ? 'text' : 'password'
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}

async function handleLogin(e) {
  e.preventDefault()
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('login-btn')
  btn.disabled = true
  btn.textContent = 'Connexion...'

  try {
    // Check admin
    const adminRes = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminAction: 'login', email, password })
    })
    if (adminRes.ok) {
      const { secret } = await adminRes.json()
      sessionStorage.setItem('admin_secret', secret)
      window.location.replace('cue-secure-admin-panel.html')
      return
    }

    // Connexion Supabase
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm')
    const supabase = createClient(
      'https://orjhkfdvihuvqcjxhjwe.supabase.co',
      document.querySelector('meta[name="supabase-key"]').content
    )
    const { data, error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) {
      document.getElementById('error-msg').textContent = 'Email ou mot de passe incorrect.'
      document.getElementById('error-msg').style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Se connecter'
      return
    }

    // Récupère le user depuis DB
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'get_user',
        userId: data.user.id,
        email: data.user.email
      })
    })
    const userData = await res.json()

    if (!userData.user) {
      alert('Compte introuvable. Réessaie.')
      btn.disabled = false
      btn.textContent = 'Se connecter'
      return
    }

    redirectAfterLogin(userData.user)

  } catch(err) {
    alert('Erreur. Réessaie.')
    btn.disabled = false
    btn.textContent = 'Se connecter'
  }
}

async function loginWithGoogle() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm')
    const supabase = createClient(
      'https://orjhkfdvihuvqcjxhjwe.supabase.co',
      document.querySelector('meta[name="supabase-key"]').content
    )
    await supabase.auth.signOut()
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://cuedj.eu/auth-callback.html' }
    })
    if (error) showError('Erreur Google : ' + error.message)
  } catch(err) {
    showError('Erreur Google. Réessaie.')
  }
}

function redirectAfterLogin(user) {
  const type = user.user_type
  const done = user.profile_complete === true

  const redirect = new URLSearchParams(window.location.search).get('redirect')
  if (redirect) { window.location.replace(redirect); return }

  if (type === 'dj') {
    window.location.replace(done ? 'dashboard-dj.html' : 'dj-onboarding.html')
  } else if (type === 'venue') {
    window.location.replace(done ? 'dashboard-venue.html' : 'venue-onboarding.html')
  } else {
    window.location.replace('index.html')
  }
}
</script>
</body>
</html>
