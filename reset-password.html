<!DOCTYPE html>

<head>

  <meta charset="UTF-8">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yamhrZmR2aWh1dnFjanhoandlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MzU2ODEsImV4cCI6MjA5NDAxMTY4MX0.Ti7anM1O3KqbZYLxRkl1rWbcghJF5FgmRxNqOTV6JL0">
  <title>CUE — Nouveau mot de passe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFC300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/logo-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#ddd; font-family:Barlow,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#111; border:1px solid rgba(255,195,0,.13); border-radius:20px; padding:48px; width:440px; max-width:100%; }
    .logo-wrap { text-align:center; margin-bottom:32px; }
    .logo-wrap img { height:64px; object-fit:contain; }
    h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:36px; color:#fff; margin-bottom:8px; }
    .sub { color:#888; font-size:15px; margin-bottom:28px; line-height:1.6; }
    label { display:block; color:#888; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    input { width:100%; background:#1a1a1a; border:1px solid #333; color:#ddd; padding:14px 16px; border-radius:10px; font-size:16px; font-family:Barlow,sans-serif; outline:none; transition:border-color .2s; margin-bottom:16px; }
    input:focus { border-color:#FFC300; }
    .btn { width:100%; padding:16px; background:#FFC300; color:#000; border:none; border-radius:10px; font-weight:700; font-size:16px; cursor:pointer; font-family:Barlow,sans-serif; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn:hover { background:#FFD740; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-outline { display:block; text-align:center; text-decoration:none; padding:16px; background:transparent; color:#888; border:1px solid #333; border-radius:10px; font-weight:700; font-size:15px; font-family:Barlow,sans-serif; cursor:pointer; transition:all .2s; }
    .btn-outline:hover { border-color:#555; color:#ddd; }
    .error { background:rgba(255,68,68,.1); color:#ff4444; border:1px solid rgba(255,68,68,.2); border-radius:8px; padding:12px; font-size:14px; margin-bottom:16px; display:none; }
    .spinner { width:18px; height:18px; min-width:18px; border:2px solid rgba(0,0,0,.2); border-top-color:#000; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .success { text-align:center; padding:16px 0; }
    .success-icon { font-size:64px; margin-bottom:20px; }

    @media (max-width: 480px) {
      body { padding: 16px; align-items: flex-start; }
      .card { padding: 32px 20px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.png" alt="CUE">
  </div>

  <div id="form-section">
    <h1>NOUVEAU<br>MOT DE PASSE</h1>
    <p class="sub">Choisis un nouveau mot de passe sécurisé.</p>

    <div class="error" id="error-msg"></div>

    <div>
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-password" placeholder="Min. 8 caractères"
             onfocus="this.style.borderColor='#FFC300'" onblur="this.style.borderColor='#333'">
    </div>
    <div>
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm-password" placeholder="Répète ton mot de passe"
             onfocus="this.style.borderColor='#FFC300'" onblur="this.style.borderColor='#333'">
    </div>

    <button class="btn" id="reset-btn" onclick="resetPassword()">
      Enregistrer →
    </button>
  </div>

  <div id="success-section" class="success" style="display:none;">
    <div class="success-icon">✅</div>
    <h2 style="font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:30px; color:#fff; margin-bottom:12px;">
      MOT DE PASSE MODIFIÉ !
    </h2>
    <p style="color:#888; margin-bottom:28px; line-height:1.7; font-size:15px;">
      Tu peux maintenant te connecter avec ton nouveau mot de passe.
    </p>
    <a href="/login.html" class="btn" style="text-decoration:none; margin-bottom:12px;">
      Se connecter →
    </a>
  </div>
</div>

<script>
async function resetPassword() {
  const newPwd = document.getElementById('new-password').value
  const confirmPwd = document.getElementById('confirm-password').value
  const errorEl = document.getElementById('error-msg')
  const btn = document.getElementById('reset-btn')

  errorEl.style.display = 'none'

  if (!newPwd || newPwd.length < 8) {
    errorEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.'
    errorEl.style.display = 'block'
    return
  }

  if (newPwd !== confirmPwd) {
    errorEl.textContent = 'Les mots de passe ne correspondent pas.'
    errorEl.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.innerHTML = '<div class="spinner"></div>'

  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm')
    const supabase = createClient(
      'https://orjhkfdvihuvqcjxhjwe.supabase.co',
      document.querySelector('meta[name="supabase-key"]').content
    )

    const { error } = await supabase.auth.updateUser({ password: newPwd })

    if (error) {
      errorEl.textContent = 'Erreur : ' + error.message
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Enregistrer →'
      return
    }

    document.getElementById('form-section').style.display = 'none'
    document.getElementById('success-section').style.display = 'block'

  } catch(err) {
    errorEl.textContent = 'Erreur réseau. Réessaie.'
    errorEl.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Enregistrer →'
  }
}
</script>
</body>
</html>
