<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CUE — Finalise ton compte</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#ddd; font-family:Barlow,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .container { max-width:600px; width:100%; padding:40px 24px; text-align:center; }
    .logo { color:#FFC300; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:32px; margin-bottom:40px; }
    h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:48px; color:#fff; margin-bottom:12px; }
    p { color:#bbb; font-size:16px; margin-bottom:40px; }
    .types { display:flex; gap:20px; justify-content:center; }
    .type-card {
      flex:1; max-width:220px; padding:32px 24px;
      border:2px solid #333; border-radius:16px;
      cursor:pointer; transition:all .3s; background:#111;
    }
    .type-card:hover { border-color:#FFC300; background:#1a1a1a; transform:translateY(-4px); }
    .type-card.active { border-color:#FFC300; background:#1a1a1a; }
    .type-icon { font-size:48px; margin-bottom:16px; }
    .type-name { font-weight:900; font-size:22px; color:#fff; margin-bottom:8px; font-family:'Barlow Condensed',sans-serif; }
    .type-desc { color:#888; font-size:13px; }
    .form-group { margin-top:24px; text-align:left; }
    .form-label { display:block; color:#888; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    .form-input { width:100%; background:#111; border:1px solid #333; color:#ddd; padding:14px; border-radius:10px; font-size:16px; font-family:Barlow,sans-serif; transition:border-color .2s; }
    .form-input:focus { outline:none; border-color:#FFC300; }
    .btn {
      width:100%; margin-top:32px; padding:18px; border-radius:12px; border:none;
      background:#FFC300; color:#000; font-weight:700; font-size:18px;
      cursor:pointer; font-family:Barlow,sans-serif; transition:all .2s;
    }
    .btn:hover { background:#FFD740; transform:translateY(-1px); }
    .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">CUE</div>
  <h1>BIENVENUE ! 👋</h1>
  <p>Une dernière chose — tu rejoins CUE en tant que :</p>

  <div class="types">
    <div class="type-card" id="card-dj" onclick="selectType('dj', this)">
      <div class="type-icon">🎧</div>
      <div class="type-name">DJ</div>
      <div class="type-desc">Je cherche des bookings</div>
    </div>
    <div class="type-card" id="card-venue" onclick="selectType('venue', this)">
      <div class="type-icon">🏛️</div>
      <div class="type-name">VENUE</div>
      <div class="type-desc">Je cherche des DJs</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Numéro de téléphone</label>
    <input type="tel" id="phone" class="form-input" placeholder="+33 6 12 34 56 78">
  </div>

  <button class="btn" id="continue-btn" onclick="continueSetup()" disabled>
    Continuer →
  </button>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'

let selectedType = null

window.selectType = function(type, el) {
  selectedType = type
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('continue-btn').disabled = false
}

window.continueSetup = async function() {
  if (!selectedType) return

  const phone = document.getElementById('phone').value.trim()
  const btn = document.getElementById('continue-btn')
  btn.disabled = true
  btn.textContent = 'Chargement...'

  try {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }

    const userId = session.user.id

    // Met à jour le type en DB
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'update_user_type',
        userId,
        userType: selectedType,
        phone
      })
    })

    if (!res.ok) throw new Error('Erreur serveur')

    // Email de bienvenue
    const meta = session.user.user_metadata
    await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'welcome',
        email: session.user.email,
        firstName: meta.full_name?.split(' ')[0] || meta.name?.split(' ')[0] || 'DJ'
      })
    })

    // Redirige selon le type
    if (selectedType === 'dj') {
      window.location.href = 'dj-onboarding.html'
    } else {
      window.location.href = 'dashboard-venue.html'
    }
  } catch (err) {
    btn.disabled = false
    btn.textContent = 'Continuer →'
    alert('Erreur. Réessaie.')
  }
}
</script>
</body>
</html>
