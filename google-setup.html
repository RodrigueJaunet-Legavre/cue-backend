<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CUE — Finalise ton compte</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#ddd; font-family:Barlow,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .container { max-width:640px; width:100%; padding:40px 24px; }
    .logo { color:#FFC300; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:32px; text-align:center; margin-bottom:40px; }
    h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:42px; color:#fff; text-align:center; margin-bottom:8px; }
    .sub { color:#888; font-size:15px; text-align:center; margin-bottom:32px; line-height:1.6; }
    .types { display:flex; gap:16px; justify-content:center; margin-bottom:32px; }
    .type-card { flex:1; max-width:200px; padding:28px 20px; border:2px solid #333; border-radius:16px; cursor:pointer; transition:all .25s; background:#111; text-align:center; }
    .type-card:hover { border-color:rgba(255,195,0,.4); background:#1a1a1a; transform:translateY(-2px); }
    .type-card.active { border-color:#FFC300; background:rgba(255,195,0,.06); }
    .type-icon { font-size:40px; margin-bottom:12px; }
    .type-name { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px; color:#fff; margin-bottom:4px; }
    .type-desc { color:#888; font-size:12px; }

    /* Sous-type venue */
    #venue-subtype { display:none; margin-bottom:24px; animation:fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .subtype-cards { display:flex; gap:12px; }
    .subtype-card { flex:1; padding:20px; border:2px solid #333; border-radius:14px; cursor:pointer; transition:all .25s; background:#0a0a0a; text-align:center; }
    .subtype-card:hover { border-color:rgba(255,195,0,.4); }
    .subtype-card.active { border-color:#FFC300; background:rgba(255,195,0,.04); }
    .subtype-icon { font-size:28px; margin-bottom:8px; }
    .subtype-name { font-weight:700; color:#fff; font-size:14px; margin-bottom:4px; }
    .subtype-desc { color:#888; font-size:11px; line-height:1.4; }

    .form-group { margin-bottom:16px; }
    .form-label { display:block; color:#888; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    .form-input { width:100%; background:#111; border:1px solid #333; color:#ddd; padding:14px; border-radius:10px; font-size:15px; font-family:Barlow,sans-serif; transition:border-color .2s; }
    .form-input:focus { outline:none; border-color:#FFC300; }
    .btn { width:100%; padding:18px; background:#FFC300; color:#000; border:none; border-radius:12px; font-weight:700; font-size:16px; cursor:pointer; font-family:Barlow,sans-serif; transition:all .2s; }
    .btn:hover { background:#FFD740; transform:translateY(-1px); }
    .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .section-title { color:#888; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; text-align:center; }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="container">
  <img src="/logo.png" alt="CUE" style="mix-blend-mode:multiply; height:111px; object-fit:contain;">
  <h1>BIENVENUE ! 👋</h1>
  <p class="sub">Une dernière chose — comment rejoins-tu CUE ?</p>

  <!-- Choix DJ / Venue -->
  <div class="types">
    <div class="type-card" id="card-dj" onclick="selectType('dj', this)">
      <div class="type-icon">🎧</div>
      <div class="type-name">DJ</div>
      <div class="type-desc">Je cherche des bookings</div>
    </div>
    <div class="type-card" id="card-venue" onclick="selectType('venue', this)">
      <div class="type-icon">🏛️</div>
      <div class="type-name">VENUE</div>
      <div class="type-desc">Je cherche des DJs</div>
    </div>
  </div>

  <!-- Sous-type venue -->
  <div id="venue-subtype">
    <div class="section-title">Type de venue</div>
    <div class="subtype-cards">
      <div class="subtype-card" id="card-particulier" onclick="selectVenueType('particulier', this)">
        <div class="subtype-icon">👤</div>
        <div class="subtype-name">Particulier</div>
        <div class="subtype-desc">Événement privé,<br>mariage, soirée...</div>
      </div>
      <div class="subtype-card" id="card-organisation" onclick="selectVenueType('organisation', this)">
        <div class="subtype-icon">🏢</div>
        <div class="subtype-name">Organisation</div>
        <div class="subtype-desc">Club, agence, label,<br>association...</div>
      </div>
    </div>
  </div>

  <!-- Téléphone -->
  <div class="form-group" id="phone-group">
    <label class="form-label">Numéro de téléphone</label>
    <input type="tel" id="phone" class="form-input" placeholder="+33 6 12 34 56 78">
  </div>

  <button class="btn" id="continue-btn" onclick="continueSetup()" disabled>
    Continuer →
  </button>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'

let selectedType = null
let selectedVenueType = null

window.selectType = function(type, el) {
  selectedType = type
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'))
  el.classList.add('active')

  const subtype = document.getElementById('venue-subtype')
  if (type === 'venue') {
    subtype.style.display = 'block'
    document.getElementById('continue-btn').disabled = true // attend le sous-type
  } else {
    subtype.style.display = 'none'
    selectedVenueType = null
    document.getElementById('continue-btn').disabled = false
  }
}

window.selectVenueType = function(type, el) {
  selectedVenueType = type
  document.querySelectorAll('.subtype-card').forEach(c => c.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('continue-btn').disabled = false
}

window.continueSetup = async function() {
  if (!selectedType) return
  if (selectedType === 'venue' && !selectedVenueType) {
    alert('Choisis entre Particulier et Organisation.')
    return
  }

  const btn = document.getElementById('continue-btn')
  btn.disabled = true
  btn.textContent = '⏳ Chargement...'

  try {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }

    // Sauvegarde type ET venue_type en DB
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'update_user_type',
        userId: session.user.id,
        userType: selectedType,
        venueType: selectedType === 'venue' ? selectedVenueType : null,
        phone: document.getElementById('phone').value.trim()
      })
    })

    if (!res.ok) throw new Error('Erreur serveur')

    // Email de bienvenue
    const meta = session.user.user_metadata
    await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'welcome',
        email: session.user.email,
        firstName: meta.full_name?.split(' ')[0] || meta.name?.split(' ')[0] || ''
      })
    })

    // Redirige vers onboarding
    if (selectedType === 'dj') {
      window.location.href = 'dj-onboarding.html'
    } else {
      window.location.href = 'venue-onboarding.html'
    }
  } catch (err) {
    alert('Erreur. Réessaie.')
    btn.disabled = false
    btn.textContent = 'Continuer →'
  }
}
</script>
</body>
</html>
