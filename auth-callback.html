<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CUE — Connexion...</title>
  <style>
    body { background:#080808; color:#ddd; font-family:Arial; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .spinner { width:48px; height:48px; border:4px solid rgba(255,195,0,.2); border-top-color:#FFC300; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 24px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div style="text-align:center;">
  <div class="spinner"></div>
  <p>Connexion en cours...</p>
</div>
<script type="module">
import { supabase } from './js/supabase-client.js'

async function handleCallback() {
  const { data: { session }, error } = await supabase.auth.getSession()

  if (error || !session) {
    window.location.href = 'login.html'
    return
  }

  const user = session.user
  const meta = user.user_metadata

  // Récupère user depuis notre DB
  const res = await fetch('/.netlify/functions/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'get_user', userId: user.id, email: user.email })
  })
  const data = await res.json()

  if (!data.user) {
    // Nouvel utilisateur → l'insère en DB
    await fetch('/.netlify/functions/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'register_supabase',
        userId: user.id,
        firstName: meta.full_name?.split(' ')[0] || '',
        lastName: meta.full_name?.split(' ').slice(1).join(' ') || '',
        email: user.email,
        phone: '',
        userType: null,
        picture: meta.avatar_url || meta.picture || '',
        googleId: user.id,
        referralCode: 'REF' + Math.floor(10000 + Math.random() * 90000)
      })
    })
    window.location.href = 'google-setup.html'
    return
  }

  const dbUser = data.user
  const userType = dbUser.user_type
  const profileComplete = dbUser.profile_complete === true

  if (!userType) {
    window.location.href = 'google-setup.html'
    return
  }

  if (userType === 'dj') {
    window.location.href = profileComplete ? 'dashboard-dj.html' : 'dj-onboarding.html'
  } else {
    window.location.href = 'dashboard-venue.html'
  }
}

handleCallback()
</script>
</body>
</html>
