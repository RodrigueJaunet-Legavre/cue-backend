<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CUE — Connexion...</title>
  <style>
    body { background:#080808; color:#ddd; font-family:Arial; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .spinner { width:48px; height:48px; border:4px solid rgba(255,195,0,.2); border-top-color:#FFC300; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 24px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  @media (max-width: 768px) {
    body { padding: 24px 16px !important; align-items: flex-start !important; }
    .container { max-width: 100% !important; padding: 0 !important; }
    h1 { font-size: 30px !important; }
    .type-cards, .subtype-cards, .types { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
    .type-card, .subtype-card { padding: 16px 12px !important; }
    .type-icon, .subtype-icon { font-size: 28px !important; }
    .two-col { grid-template-columns: 1fr !important; }
    .form-input, input { font-size: 16px !important; }
    .btn, .btn-next { padding: 16px !important; font-size: 15px !important; }
    .code-digit { width: 44px !important; height: 52px !important; font-size: 22px !important; }
  }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div style="text-align:center;">
  <div class="spinner"></div>
  <p>Connexion en cours...</p>
</div>
<script type="module">
import { supabase } from './js/supabase-client.js'

async function handleCallback() {
  console.log('=== handleCallback ===')
  const { data: { session }, error } = await supabase.auth.getSession()
  console.log('session error:', error)
  console.log('session:', session)
  if (error || !session) { window.location.href = 'login.html'; return }

  const user = session.user
  console.log('session user id:', user?.id)
  console.log('session user email:', user?.email)

  // Cherche en DB par ID ET par email
  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'get_user',
      userId: user.id,
      email: user.email
    })
  })
  const data = await res.json()
  console.log('get_user réponse:', data)

  if (data.user) {
    // Compte trouvé → met à jour l'ID si nécessaire
    const dbUser = data.user
    const userType = dbUser.user_type
    const profileComplete = dbUser.profile_complete === true

    if (!userType || userType === 'pending') {
      window.location.href = 'google-setup.html'
      return
    }

    if (userType === 'dj') {
      window.location.href = profileComplete ? 'dashboard-dj.html' : 'dj-onboarding.html'
    } else if (userType === 'venue') {
      window.location.href = profileComplete ? 'dashboard-venue.html' : 'venue-onboarding.html'
    } else {
      window.location.href = 'google-setup.html'
    }
    return
  }

  // Vraiment nouvel utilisateur → google-setup
  const meta = user.user_metadata
  const firstName = meta.full_name?.split(' ')[0] || meta.name?.split(' ')[0] || ''
  await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'register_supabase',
      userId: user.id,
      firstName,
      lastName: meta.full_name?.split(' ').slice(1).join(' ') || '',
      email: user.email,
      phone: '',
      userType: 'pending',
      picture: meta.avatar_url || meta.picture || '',
      googleId: user.id,
      referralCode: 'REF' + Math.floor(10000 + Math.random() * 90000)
    })
  })
  await fetch('/api/send-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'welcome', email: user.email, firstName })
  })
  window.location.href = 'google-setup.html'
}

handleCallback()
</script>
</body>
</html>
